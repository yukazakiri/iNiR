# iceiceice configuration for iNiR
#
# Single tool that replaces both matugen (template engine) and
# generate_colors_material.py (color JSON/SCSS generation).
#
# Templates use the same {{ var }} syntax as matugen.
# Matugen-compatible variable paths are supported:
#   {{colors.primary.default.hex}}           → "#rrggbb"
#   {{colors.primary.default.hex_stripped}}   → "rrggbb"
#   {{colors.on_primary.dark.hex}}           → dark variant
#   {{colors.surface.light.hex}}             → light variant
#   {{image}}                                → wallpaper path
#
# Active templates (processed on every wallpaper/color change):

# GTK4/libadwaita theme (Nautilus, GNOME apps)
[templates.gtk4]
input = '~/.config/iceiceice/templates/gtk-4.0/gtk.css'
output = '~/.config/gtk-4.0/gtk.css'

# GTK3 theme (legacy apps)
[templates.gtk3]
input = '~/.config/iceiceice/templates/gtk-3.0/gtk.css'
output = '~/.config/gtk-3.0/gtk.css'

# Fuzzel launcher theme
[templates.fuzzel]
input = '~/.config/iceiceice/templates/fuzzel/fuzzel_theme.ini'
output = '~/.config/fuzzel/fuzzel_theme.ini'

# KDE source color cache (used by kde-material-you-colors-wrapper)
[templates.kde_colors]
input = '~/.config/iceiceice/templates/kde/color.txt'
output = '~/.local/state/quickshell/user/generated/color.txt'

# Wallpaper path tracking
[templates.wallpaper]
input = '~/.config/iceiceice/templates/wallpaper.txt'
output = '~/.local/state/quickshell/user/generated/wallpaper/path.txt'

# Firefox Material Fox theme
# Setup: Link output to ~/.mozilla/firefox/<profile>/chrome/theme-material-blue.css
# See: https://github.com/edelvarden/material-fox-updated
[templates.firefox_materialfox]
input = '~/.config/iceiceice/templates/firefox/materialfox.css'
output = '~/.local/state/quickshell/user/generated/firefox-materialfox.css'
